<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebGL 3D Model</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0d0d14;
      font-family: 'Courier New', monospace;
      color: #c8c8d8;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    h1 {
      font-size: 0.75rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #5a5a7a;
      margin-bottom: 1.5rem;
    }

    #canvas-wrap {
      position: relative;
      border: 1px solid #1e1e30;
      box-shadow: 0 0 60px rgba(90, 100, 255, 0.08);
    }

    canvas {
      display: block;
    }

    .controls {
      margin-top: 1.2rem;
      display: flex;
      gap: 2rem;
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      color: #3a3a58;
    }

    .controls span {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #5a64ff;
    }

    #info {
      position: absolute;
      top: 12px;
      left: 14px;
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      color: #2e2e50;
    }
  </style>
</head>

<body>

  <h1>WebGL · 3D Renderer</h1>

  <div id="canvas-wrap">
    <canvas id="glCanvas" width="600" height="480"></canvas>
    <div id="info">DRAG TO ROTATE &nbsp;·&nbsp; SCROLL TO ZOOM</div>
  </div>

  <div class="controls">
    <span><span class="dot"></span> Vertex Shader</span>
    <span><span class="dot" style="background:#ff6464"></span> Fragment Shader</span>
    <span><span class="dot" style="background:#64ffb4"></span> Phong Lighting</span>
  </div>

  <script>
    // ─── Canvas & GL Setup ────────────────────────────────────────────────
    const canvas = document.getElementById('glCanvas');
    const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
    if (!gl) {alert('WebGL not supported in this browser.');}

    // ─── Shaders ─────────────────────────────────────────────────────────
    const vsSource = `
  attribute vec4 aPosition;
  attribute vec3 aNormal;

  uniform mat4 uModelMatrix;
  uniform mat4 uViewMatrix;
  uniform mat4 uProjectionMatrix;
  uniform mat3 uNormalMatrix;

  varying vec3 vNormal;
  varying vec3 vFragPos;

  void main(void) {
    vec4 worldPos = uModelMatrix * aPosition;
    vFragPos = vec3(worldPos);
    vNormal = normalize(uNormalMatrix * aNormal);
    gl_Position = uProjectionMatrix * uViewMatrix * worldPos;
  }
`;

    const fsSource = `
  precision mediump float;

  varying vec3 vNormal;
  varying vec3 vFragPos;

  uniform vec3 uLightPos;
  uniform vec3 uViewPos;
  uniform vec3 uObjectColor;

  void main(void) {
    // Ambient
    float ambientStrength = 0.18;
    vec3 ambient = ambientStrength * vec3(1.0);

    // Diffuse
    vec3 norm = normalize(vNormal);
    vec3 lightDir = normalize(uLightPos - vFragPos);
    float diff = max(dot(norm, lightDir), 0.0);
    vec3 diffuse = diff * vec3(1.0, 0.95, 0.9);

    // Specular
    float specularStrength = 0.6;
    vec3 viewDir = normalize(uViewPos - vFragPos);
    vec3 reflectDir = reflect(-lightDir, norm);
    float spec = pow(max(dot(viewDir, reflectDir), 0.0), 48.0);
    vec3 specular = specularStrength * spec * vec3(1.0);

    vec3 result = (ambient + diffuse + specular) * uObjectColor;
    gl_FragColor = vec4(result, 1.0);
  }
`;

    // ─── Shader Compilation ───────────────────────────────────────────────
    function compileShader(gl, type, source) {
      const shader = gl.createShader(type);
      gl.shaderSource(shader, source);
      gl.compileShader(shader);
      if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
        console.error('Shader error:', gl.getShaderInfoLog(shader));
        gl.deleteShader(shader);
        return null;
      }
      return shader;
    }

    const vs = compileShader(gl, gl.VERTEX_SHADER, vsSource);
    const fs = compileShader(gl, gl.FRAGMENT_SHADER, fsSource);

    const program = gl.createProgram();
    gl.attachShader(program, vs);
    gl.attachShader(program, fs);
    gl.linkProgram(program);
    if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
      console.error('Program link error:', gl.getProgramInfoLog(program));
    }
    gl.useProgram(program);

    // ─── Geometry: Rounded Box (subdivided cube) ──────────────────────────
    function buildRoundedCube(size, segments) {
      const verts = [], norms = [], indices = [];
      const half = size / 2;
      const step = size / segments;

      // 6 faces: +X -X +Y -Y +Z -Z
      const faces = [
        {n: [1, 0, 0], u: [0, 1, 0], v: [0, 0, 1]},
        {n: [-1, 0, 0], u: [0, 1, 0], v: [0, 0, -1]},
        {n: [0, 1, 0], u: [1, 0, 0], v: [0, 0, 1]},
        {n: [0, -1, 0], u: [-1, 0, 0], v: [0, 0, 1]},
        {n: [0, 0, 1], u: [1, 0, 0], v: [0, 1, 0]},
        {n: [0, 0, -1], u: [-1, 0, 0], v: [0, 1, 0]},
      ];

      for (const face of faces) {
        const base = verts.length / 3;
        for (let i = 0; i <= segments; i++) {
          for (let j = 0; j <= segments; j++) {
            const s = -half + i * step;
            const t = -half + j * step;
            const x = face.n[0] * half + face.u[0] * s + face.v[0] * t;
            const y = face.n[1] * half + face.u[1] * s + face.v[1] * t;
            const z = face.n[2] * half + face.u[2] * s + face.v[2] * t;
            verts.push(x, y, z);
            norms.push(...face.n);
          }
        }
        for (let i = 0; i < segments; i++) {
          for (let j = 0; j < segments; j++) {
            const a = base + i * (segments + 1) + j;
            const b = a + 1;
            const c = a + (segments + 1);
            const d = c + 1;
            indices.push(a, c, b, b, c, d);
          }
        }
      }
      return {verts: new Float32Array(verts), norms: new Float32Array(norms), indices: new Uint16Array(indices)};
    }

    const geo = buildRoundedCube(1.4, 8);

    // ─── Buffers ──────────────────────────────────────────────────────────
    function makeBuffer(target, data) {
      const buf = gl.createBuffer();
      gl.bindBuffer(target, buf);
      gl.bufferData(target, data, gl.STATIC_DRAW);
      return buf;
    }
    const posBuf = makeBuffer(gl.ARRAY_BUFFER, geo.verts);
    const normBuf = makeBuffer(gl.ARRAY_BUFFER, geo.norms);
    const idxBuf = makeBuffer(gl.ELEMENT_ARRAY_BUFFER, geo.indices);

    // Attribute pointers
    const aPosition = gl.getAttribLocation(program, 'aPosition');
    const aNormal = gl.getAttribLocation(program, 'aNormal');

    // ─── Matrix Math ──────────────────────────────────────────────────────
    function mat4() {return new Float32Array(16);}

    function identity(m) {
      m.fill(0);
      m[0] = m[5] = m[10] = m[15] = 1;
      return m;
    }

    function perspective(m, fov, aspect, near, far) {
      const f = 1.0 / Math.tan(fov / 2);
      m.fill(0);
      m[0] = f / aspect;
      m[5] = f;
      m[10] = (far + near) / (near - far);
      m[11] = -1;
      m[14] = (2 * far * near) / (near - far);
      return m;
    }

    function lookAt(m, eye, center, up) {
      const z = normalize3(sub3(eye, center));
      const x = normalize3(cross3(up, z));
      const y = cross3(z, x);
      m[0] = x[0]; m[1] = y[0]; m[2] = z[0]; m[3] = 0;
      m[4] = x[1]; m[5] = y[1]; m[6] = z[1]; m[7] = 0;
      m[8] = x[2]; m[9] = y[2]; m[10] = z[2]; m[11] = 0;
      m[12] = -dot3(x, eye); m[13] = -dot3(y, eye); m[14] = -dot3(z, eye); m[15] = 1;
      return m;
    }

    function rotateXY(m, rx, ry) {
      const cx = Math.cos(rx), sx = Math.sin(rx);
      const cy = Math.cos(ry), sy = Math.sin(ry);
      identity(m);
      m[0] = cy; m[2] = sy;
      m[4] = sx * sy; m[5] = cx; m[6] = -sx * cy;
      m[8] = -cx * sy; m[9] = sx; m[10] = cx * cy;
      return m;
    }

    function normalMat(out, model) {
      // 3x3 inverse-transpose of upper-left of model
      const a = model;
      const det = a[0] * (a[5] * a[10] - a[6] * a[9]) - a[1] * (a[4] * a[10] - a[6] * a[8]) + a[2] * (a[4] * a[9] - a[5] * a[8]);
      const inv = 1 / det;
      out[0] = (a[5] * a[10] - a[6] * a[9]) * inv;
      out[1] = (a[2] * a[9] - a[1] * a[10]) * inv;
      out[2] = (a[1] * a[6] - a[2] * a[5]) * inv;
      out[3] = (a[6] * a[8] - a[4] * a[10]) * inv;
      out[4] = (a[0] * a[10] - a[2] * a[8]) * inv;
      out[5] = (a[2] * a[4] - a[0] * a[6]) * inv;
      out[6] = (a[4] * a[9] - a[5] * a[8]) * inv;
      out[7] = (a[1] * a[8] - a[0] * a[9]) * inv;
      out[8] = (a[0] * a[5] - a[1] * a[4]) * inv;
      return out;
    }

    function sub3(a, b) {return [a[0] - b[0], a[1] - b[1], a[2] - b[2]];}
    function dot3(a, b) {return a[0] * b[0] + a[1] * b[1] + a[2] * b[2];}
    function cross3(a, b) {return [a[1] * b[2] - a[2] * b[1], a[2] * b[0] - a[0] * b[2], a[0] * b[1] - a[1] * b[0]];}
    function normalize3(v) {const l = Math.hypot(...v) || 1; return v.map(x => x / l);}

    // ─── Uniform Locations ────────────────────────────────────────────────
    const uLoc = {
      model: gl.getUniformLocation(program, 'uModelMatrix'),
      view: gl.getUniformLocation(program, 'uViewMatrix'),
      proj: gl.getUniformLocation(program, 'uProjectionMatrix'),
      norm: gl.getUniformLocation(program, 'uNormalMatrix'),
      light: gl.getUniformLocation(program, 'uLightPos'),
      cam: gl.getUniformLocation(program, 'uViewPos'),
      color: gl.getUniformLocation(program, 'uObjectColor'),
    };

    // ─── Interaction State ────────────────────────────────────────────────
    let rotX = 0.4, rotY = 0.5;
    let zoom = 4.2;
    let dragging = false, lastX = 0, lastY = 0;

    canvas.addEventListener('mousedown', e => {dragging = true; lastX = e.clientX; lastY = e.clientY;});
    window.addEventListener('mouseup', () => dragging = false);
    window.addEventListener('mousemove', e => {
      if (!dragging) return;
      rotY += (e.clientX - lastX) * 0.007;
      rotX += (e.clientY - lastY) * 0.007;
      rotX = Math.max(-Math.PI / 2 + 0.05, Math.min(Math.PI / 2 - 0.05, rotX));
      lastX = e.clientX; lastY = e.clientY;
    });
    canvas.addEventListener('wheel', e => {
      zoom = Math.max(2.0, Math.min(8.0, zoom + e.deltaY * 0.01));
      e.preventDefault();
    }, {passive: false});

    // Touch support
    canvas.addEventListener('touchstart', e => {
      if (e.touches.length === 1) {dragging = true; lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;}
    }, {passive: true});
    canvas.addEventListener('touchend', () => dragging = false, {passive: true});
    canvas.addEventListener('touchmove', e => {
      if (!dragging || e.touches.length !== 1) return;
      rotY += (e.touches[0].clientX - lastX) * 0.007;
      rotX += (e.touches[0].clientY - lastY) * 0.007;
      rotX = Math.max(-Math.PI / 2 + 0.05, Math.min(Math.PI / 2 - 0.05, rotX));
      lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
    }, {passive: true});

    // ─── Render Loop ──────────────────────────────────────────────────────
    const projM = mat4();
    const viewM = mat4();
    const modelM = mat4();
    const normM = new Float32Array(9);

    gl.enable(gl.DEPTH_TEST);
    gl.enable(gl.CULL_FACE);
    gl.clearColor(0.05, 0.05, 0.08, 1.0);

    let t = 0;
    function render() {
      t += 0.008;
      if (!dragging) {rotY += 0.005;}

      gl.viewport(0, 0, canvas.width, canvas.height);
      gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);

      // Matrices
      perspective(projM, Math.PI / 4, canvas.width / canvas.height, 0.1, 100);

      const camPos = [0, 0.6, zoom];
      lookAt(viewM, camPos, [0, 0, 0], [0, 1, 0]);
      rotateXY(modelM, rotX, rotY);

      normalMat(normM, modelM);

      // Bind position
      gl.bindBuffer(gl.ARRAY_BUFFER, posBuf);
      gl.enableVertexAttribArray(aPosition);
      gl.vertexAttribPointer(aPosition, 3, gl.FLOAT, false, 0, 0);

      // Bind normals
      gl.bindBuffer(gl.ARRAY_BUFFER, normBuf);
      gl.enableVertexAttribArray(aNormal);
      gl.vertexAttribPointer(aNormal, 3, gl.FLOAT, false, 0, 0);

      // Bind index
      gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, idxBuf);

      // Uniforms
      gl.uniformMatrix4fv(uLoc.proj, false, projM);
      gl.uniformMatrix4fv(uLoc.view, false, viewM);
      gl.uniformMatrix4fv(uLoc.model, false, modelM);
      gl.uniformMatrix3fv(uLoc.norm, false, normM);
      gl.uniform3fv(uLoc.light, [3.0 + Math.sin(t) * 2, 4.0, 3.0 + Math.cos(t) * 2]);
      gl.uniform3fv(uLoc.cam, camPos);
      gl.uniform3fv(uLoc.color, [0.36, 0.38, 0.95]); // indigo-blue

      gl.drawElements(gl.TRIANGLES, geo.indices.length, gl.UNSIGNED_SHORT, 0);

      requestAnimationFrame(render);
    }

    render();
  </script>
</body>

</html>
