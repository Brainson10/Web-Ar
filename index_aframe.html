<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A-Frame · 3D Model</title>

  <!-- A-Frame (includes Three.js + WebGL internally) -->
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0d0d14;
      font-family: 'Courier New', monospace;
      color: #c8c8d8;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    h1 {
      font-size: 0.75rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #5a5a7a;
      margin-bottom: 1.2rem;
      z-index: 10;
    }

    #canvas-wrap {
      position: relative;
      width: 600px;
      height: 480px;
      border: 1px solid #1e1e30;
      box-shadow: 0 0 60px rgba(90, 100, 255, 0.08);
      overflow: hidden;
    }

    a-scene {
      width: 600px !important;
      height: 480px !important;
    }

    #info {
      position: absolute;
      top: 12px;
      left: 14px;
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      color: #8888aa;
      pointer-events: none;
      z-index: 10;
    }

    .controls {
      margin-top: 1.2rem;
      display: flex;
      gap: 2rem;
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      color: #3a3a58;
      z-index: 10;
    }

    .controls span {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #5a64ff;
    }

    /* Hide A-Frame's default UI */
    .a-enter-vr-button {
      display: none !important;
    }

    .a-orientation-modal {
      display: none !important;
    }
  </style>
</head>

<body>

  <h1>A-Frame · 3D Renderer</h1>

  <div id="canvas-wrap">
    <div id="info">DRAG TO ROTATE &nbsp;·&nbsp; SCROLL TO ZOOM &nbsp;·&nbsp; WASD TO PAN</div>

    <!-- ─── A-Frame Scene ─────────────────────────────────────────── -->
    <a-scene embedded background="color: #0d0d14"
      renderer="antialias: true; colorManagement: true; shadowMapEnabled: true"
      fog="type: linear; color: #0d0d14; near: 12; far: 30" vr-mode-ui="enabled: false">

      <!-- ─── Assets ─────────────────────────────────────────────── -->
      <a-assets>
        <a-mixin id="glow-blue" material="color: #5a64ff; metalness: 0.3; roughness: 0.35; shader: standard">
        </a-mixin>
      </a-assets>

      <!-- ─── Camera ─────────────────────────────────────────────── -->
      <a-entity id="cam-rig" position="0 0 0">
        <a-camera position="0 1.2 4.5" look-controls="reverseMouseDrag: false; touchEnabled: true"
          wasd-controls="enabled: true; acceleration: 20" fov="45" near="0.1" far="100"></a-camera>
      </a-entity>

      <!-- ─── Lighting ────────────────────────────────────────────── -->

      <!-- Ambient -->
      <a-light type="ambient" color="#ffffff" intensity="0.25"></a-light>

      <!-- Key light (warm, orbits via animation) -->
      <a-entity id="key-light-rig" rotation="0 0 0"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear">
        <a-light type="point" color="#ffeedd" intensity="1.8" distance="20" position="4 5 0"
          cast-shadow="true"></a-light>
        <!-- Visible light bulb -->
        <a-sphere position="4 5 0" radius="0.06"
          material="color: #ffeedd; emissive: #ffeedd; emissiveIntensity: 1; shader: flat"></a-sphere>
      </a-entity>

      <!-- Fill light (cool blue) -->
      <a-light type="point" color="#4466ff" intensity="0.8" distance="20" position="-4 2 -3"></a-light>
      <a-sphere position="-4 2 -3" radius="0.06"
        material="color: #4466ff; emissive: #4466ff; emissiveIntensity: 1; shader: flat"></a-sphere>

      <!-- Rim light -->
      <a-light type="directional" color="#aaaaff" intensity="0.4" position="0 6 -4"></a-light>

      <!-- ─── Main Cube (auto-rotating) ───────────────────────────── -->
      <a-entity id="cube-rig"
        animation__rotatey="property: rotation; from: 0 0 0; to: 0 360 0; loop: true; dur: 6000; easing: linear">
        <!-- Main mesh -->
        <a-box position="0 0 0" width="1.5" height="1.5" depth="1.5" segments-width="4" segments-height="4"
          segments-depth="4" material="color: #5a64ff; metalness: 0.3; roughness: 0.35; shader: standard"
          shadow="cast: true; receive: true"></a-box>

        <!-- Wireframe overlay (slightly larger, transparent) -->
        <a-box position="0 0 0" width="1.51" height="1.51" depth="1.51"
          material="color: #8888ff; wireframe: true; opacity: 0.08; transparent: true; shader: flat"></a-box>
      </a-entity>

      <!-- ─── Ground Plane ────────────────────────────────────────── -->
      <a-plane position="0 -1.5 0" rotation="-90 0 0" width="14" height="14"
        material="color: #0a0a12; roughness: 1.0; metalness: 0; shader: standard" shadow="receive: true"></a-plane>

      <!-- ─── Grid (manual thin lines via thin boxes) ─────────────── -->
      <a-entity id="grid" position="0 -1.49 0">
        <!-- Grid lines X-axis -->
        <a-entity id="grid-x">
          <a-box width="14" height="0.003" depth="0.02" position="0 0 -6"
            material="color: #1a1a2e; opacity: 0.6; transparent: true; shader: flat"></a-box>
          <a-box width="14" height="0.003" depth="0.02" position="0 0 -4"
            material="color: #1a1a2e; opacity: 0.6; transparent: true; shader: flat"></a-box>
          <a-box width="14" height="0.003" depth="0.02" position="0 0 -2"
            material="color: #1a1a2e; opacity: 0.6; transparent: true; shader: flat"></a-box>
          <a-box width="14" height="0.003" depth="0.02" position="0 0  0"
            material="color: #1a1a2e; opacity: 0.6; transparent: true; shader: flat"></a-box>
          <a-box width="14" height="0.003" depth="0.02" position="0 0  2"
            material="color: #1a1a2e; opacity: 0.6; transparent: true; shader: flat"></a-box>
          <a-box width="14" height="0.003" depth="0.02" position="0 0  4"
            material="color: #1a1a2e; opacity: 0.6; transparent: true; shader: flat"></a-box>
          <a-box width="14" height="0.003" depth="0.02" position="0 0  6"
            material="color: #1a1a2e; opacity: 0.6; transparent: true; shader: flat"></a-box>
        </a-entity>
        <!-- Grid lines Z-axis -->
        <a-entity id="grid-z">
          <a-box width="0.02" height="0.003" depth="14" position="-6 0 0"
            material="color: #1a1a2e; opacity: 0.6; transparent: true; shader: flat"></a-box>
          <a-box width="0.02" height="0.003" depth="14" position="-4 0 0"
            material="color: #1a1a2e; opacity: 0.6; transparent: true; shader: flat"></a-box>
          <a-box width="0.02" height="0.003" depth="14" position="-2 0 0"
            material="color: #1a1a2e; opacity: 0.6; transparent: true; shader: flat"></a-box>
          <a-box width="0.02" height="0.003" depth="14" position=" 0 0 0"
            material="color: #1a1a2e; opacity: 0.6; transparent: true; shader: flat"></a-box>
          <a-box width="0.02" height="0.003" depth="14" position=" 2 0 0"
            material="color: #1a1a2e; opacity: 0.6; transparent: true; shader: flat"></a-box>
          <a-box width="0.02" height="0.003" depth="14" position=" 4 0 0"
            material="color: #1a1a2e; opacity: 0.6; transparent: true; shader: flat"></a-box>
          <a-box width="0.02" height="0.003" depth="14" position=" 6 0 0"
            material="color: #1a1a2e; opacity: 0.6; transparent: true; shader: flat"></a-box>
        </a-entity>
      </a-entity>

    </a-scene>
    <!-- ─── End A-Frame Scene ───────────────────────────────────────── -->

  </div>

  <div class="controls">
    <span><span class="dot"></span> A-Frame Entities</span>
    <span><span class="dot" style="background:#ff6464"></span> Declarative HTML</span>
    <span><span class="dot" style="background:#64ffb4"></span> Built-in Animations</span>
  </div>

</body>

</html>
